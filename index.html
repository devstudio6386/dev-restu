<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luxe Dine</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&amp;family=Poppins:wght@300;400;500;600;700&amp;family=Space+Grotesk:wght@500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    :root {
      --pink-hot: #FF006E;
      --pink-light: #FF4DA6;
      --blue-electric: #00D4FF;
      --blue-deep: #0066FF;
      --purple-mid: #8B00FF;
      --card-glass: rgba(255, 255, 255, 0.06);
      --card-border: rgba(255, 105, 180, 0.2);
    }
    
    html, body { height: 100%; margin: 0; }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0D001A 0%, #1A0030 50%, #000D1A 100%);
      background-attachment: fixed;
      color: #FFFFFF;
    }
    
    .font-playfair { font-family: 'Playfair Display', serif; }
    .font-space { font-family: 'Space Grotesk', sans-serif; }
    
    .gradient-text {
      background: linear-gradient(90deg, #FF4DA6, #00D4FF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .gradient-border {
      position: relative;
      background: var(--card-glass);
      border-radius: 16px;
    }
    
    .gradient-border::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      padding: 1.5px;
      background: linear-gradient(135deg, var(--pink-hot), var(--purple-mid), var(--blue-electric));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
    }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 105, 180, 0.2);
      border-radius: 20px;
    }
    
    .glass-card:hover {
      background: linear-gradient(135deg, rgba(255,0,110,0.12), rgba(0,212,255,0.12));
      border-color: rgba(255, 0, 110, 0.4);
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(255, 0, 110, 0.15), 0 0 60px rgba(0, 212, 255, 0.1);
    }
    
    .search-input {
      background: rgba(255, 255, 255, 0.08);
      border: 1.5px solid rgba(255, 0, 110, 0.4);
      transition: all 0.3s ease;
    }
    
    .search-input:focus {
      outline: none;
      border-color: var(--pink-hot);
      box-shadow: 0 0 0 3px rgba(255,0,110,0.25), 0 0 30px rgba(0,212,255,0.2);
    }
    
    .glow-button {
      background: linear-gradient(135deg, #FF006E, #8B00FF);
      box-shadow: 0 4px 20px rgba(255, 0, 110, 0.4);
      transition: all 0.3s ease;
    }
    
    .glow-button:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 30px rgba(255, 0, 110, 0.6), 0 0 40px rgba(139, 0, 255, 0.3);
    }
    
    .profile-ring {
      background: linear-gradient(135deg, #FF006E, #00D4FF);
      padding: 2px;
      border-radius: 50%;
    }
    
    .category-scroll::-webkit-scrollbar { display: none; }
    .category-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    
    .category-item {
      transition: all 0.3s ease;
    }
    
    .category-item:hover {
      transform: scale(1.1);
    }
    
    .category-item.active .category-img {
      border: 3px solid transparent;
      background: linear-gradient(#1A0030, #1A0030) padding-box,
                  linear-gradient(135deg, #FF006E, #00D4FF) border-box;
    }
    
    .banner-slide {
      animation: fadeIn 0.5s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(5deg); }
    }
    
    .floating { animation: float 3s ease-in-out infinite; }
    
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    
    .shimmer-text {
      background: linear-gradient(90deg, #fff, #FF4DA6, #00D4FF, #fff);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite;
    }
    
    .cart-badge {
      background: linear-gradient(135deg, #FF006E, #FF4DA6);
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    .menu-item-card {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .menu-item-card:hover {
      background: linear-gradient(135deg, rgba(255,0,110,0.1), rgba(0,212,255,0.1));
      border-color: rgba(255, 0, 110, 0.5);
    }
    
    .add-btn {
      background: linear-gradient(135deg, rgba(255,0,110,0.2), rgba(139,0,255,0.2));
      border: 1px solid rgba(255, 0, 110, 0.5);
      transition: all 0.3s ease;
    }
    
    .add-btn:hover {
      background: linear-gradient(135deg, #FF006E, #8B00FF);
      box-shadow: 0 0 20px rgba(255, 0, 110, 0.5);
    }
    
    .veg-indicator {
      width: 16px;
      height: 16px;
      border: 2px solid #22c55e;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .veg-indicator::after {
      content: '';
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
    }
    
    .non-veg-indicator {
      border-color: #ef4444;
    }
    
    .non-veg-indicator::after {
      background: #ef4444;
    }
    
    .toggle-switch {
      width: 50px;
      height: 26px;
      background: rgba(255,255,255,0.1);
      border-radius: 13px;
      position: relative;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .toggle-switch.active {
      background: linear-gradient(90deg, #22c55e, #4ade80);
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.5);
    }
    
    .toggle-switch::after {
      content: '';
      width: 22px;
      height: 22px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: 2px;
      left: 2px;
      transition: all 0.3s ease;
    }
    
    .toggle-switch.active::after {
      left: 26px;
    }
    
    .cart-panel {
      background: linear-gradient(180deg, #1A0030 0%, #0D001A 100%);
      border-top: 1px solid rgba(255, 0, 110, 0.3);
      backdrop-filter: blur(20px);
    }
    
    .quantity-btn {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(255,0,110,0.3), rgba(139,0,255,0.3));
      border: 1px solid rgba(255,0,110,0.5);
      border-radius: 8px;
      color: white;
      font-weight: 600;
      transition: all 0.2s ease;
    }
    
    .quantity-btn:hover {
      background: linear-gradient(135deg, #FF006E, #8B00FF);
      transform: scale(1.1);
    }
    
    .dot-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transition: all 0.3s ease;
    }
    
    .dot-indicator.active {
      width: 24px;
      border-radius: 4px;
      background: linear-gradient(90deg, #FF006E, #00D4FF);
    }
    
    .icon-gradient {
      background: linear-gradient(135deg, #FF006E, #00D4FF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .header-glass {
      background: linear-gradient(180deg, rgba(26, 0, 48, 0.95) 0%, rgba(26, 0, 48, 0.8) 100%);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 105, 180, 0.15);
    }
    
    .wallet-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,105,180,0.3);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }
    
    .wallet-btn:hover {
      background: rgba(255,0,110,0.2);
      border-color: rgba(255,0,110,0.6);
      box-shadow: 0 0 20px rgba(255,0,110,0.3);
    }
    
    .food-img-container {
      position: relative;
      overflow: hidden;
      border-radius: 16px;
    }
    
    .food-img-container::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.6) 100%);
    }
    
    .bestseller-tag {
      background: linear-gradient(135deg, #FF006E, #FF4DA6);
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 600;
    }
    
    .rating-badge {
      background: linear-gradient(135deg, #22c55e, #4ade80);
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .loading-spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #FF006E;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: linear-gradient(135deg, #FF006E, #8B00FF);
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 500;
      box-shadow: 0 10px 40px rgba(255,0,110,0.4);
      z-index: 1000;
      opacity: 0;
      transition: all 0.3s ease;
    }
    
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
 </head>

      { id: 'pizza', name: 'Pizza', emoji: '🍕' },
      { id: 'main', name: 'Curries', emoji: '🍛' },
      { id: 'chinese', name: 'Chinese', emoji: '🥡' },
      { id: 'starters', name: 'Starters', emoji: '🍢' },
      { id: 'south', name: 'South', emoji: '🥘' },
      { id: 'desserts', name: 'Desserts', emoji: '🍨' }
    ];

    const banners = [
      { gradient: 'linear-gradient(135deg, #FF006E 0%, #FF4DA6 40%, #8B00FF 100%)', title: 'FLAT 50% OFF', subtitle: 'On your first 3 orders', emoji: '🎫' },
      { gradient: 'linear-gradient(135deg, #0066FF, #00D4FF, #8B00FF)', title: 'FREE DELIVERY', subtitle: 'Tonight Special 🌙', emoji: '🚴' },
      { gradient: 'linear-gradient(135deg, #FF006E, #FF8C00)', title: 'NEW ARRIVALS', subtitle: 'Fresh & Hot 🔥', emoji: '✨' }
    ];

    // State
    let cart = [];
    let currentBanner = 0;
    let selectedCategory = 'all';
    let vegModeOn = false;
    let searchQuery = '';
    let isLoading = false;

    // Initialize Element SDK
    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => {
        document.getElementById('restaurant-display').textContent = config.restaurant_name || defaultConfig.restaurant_name;
        document.getElementById('table-display').textContent = config.table_number || defaultConfig.table_number;
        
        const fontFamily = config.font_family || defaultConfig.font_family;
        document.body.style.fontFamily = `${fontFamily}, Poppins, sans-serif`;
        
        const baseSize = config.font_size || defaultConfig.font_size;
        document.documentElement.style.fontSize = `${baseSize}px`;
      },
      mapToCapabilities: (config) => ({
        recolorables: [
          {
            get: () => config.background_color || defaultConfig.background_color,
            set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); }
          },
          {
            get: () => config.card_color || defaultConfig.card_color,
            set: (v) => { config.card_color = v; window.elementSdk.setConfig({ card_color: v }); }
          },
          {
            get: () => config.text_color || defaultConfig.text_color,
            set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); }
          },
          {
            get: () => config.accent_color || defaultConfig.accent_color,
            set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); }
          },
          {
            get: () => config.highlight_color || defaultConfig.highlight_color,
            set: (v) => { config.highlight_color = v; window.elementSdk.setConfig({ highlight_color: v }); }
          }
        ],
        borderables: [],
        fontEditable: {
          get: () => config.font_family || defaultConfig.font_family,
          set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
        },
        fontSizeable: {
          get: () => config.font_size || defaultConfig.font_size,
          set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
        }
      }),
      mapToEditPanelValues: (config) => new Map([
        ['restaurant_name', config.restaurant_name || defaultConfig.restaurant_name],
        ['table_number', config.table_number || defaultConfig.table_number],
        ['promo_text', config.promo_text || defaultConfig.promo_text]
      ])
    });

    // Data SDK Handler
    const dataHandler = {
      onDataChanged(data) {
        cart = data.map(item => ({
          ...item,
          menuItem: menuData.find(m => m.id === item.item_id)
        })).filter(item => item.menuItem);
        updateCartUI();
        renderMenu();
      }
    };

    // Initialize Data SDK
    async function initDataSDK() {
      const result = await window.dataSdk.init(dataHandler);
      if (!result.isOk) {
        console.error('Failed to initialize Data SDK');
      }
    }
    initDataSDK();

    // Render functions
    function renderBanners() {
      const container = document.getElementById('banner-container');
      const dotsContainer = document.getElementById('banner-dots');
      const config = window.elementSdk.config;
      const promoText = config.promo_text || defaultConfig.promo_text;
      
      const banner = banners[currentBanner];
      container.innerHTML = `
        <div class="banner-slide h-full p-6 flex items-center justify-between" style="background: ${banner.gradient}">
          <div>
            <p class="text-3xl font-bold text-white drop-shadow-lg">${currentBanner === 0 ? promoText : banner.title}</p>
            <p class="text-white/90 mt-1">${banner.subtitle}</p>
            <button class="mt-3 bg-black/80 text-white px-5 py-2 rounded-full text-sm font-semibold hover:bg-black transition-colors flex items-center gap-2">
              Order Now <span>→</span>
            </button>
          </div>
          <span class="text-6xl floating">${banner.emoji}</span>
        </div>
      `;
      
      dotsContainer.innerHTML = banners.map((_, i) => `
        <div class="dot-indicator ${i === currentBanner ? 'active' : ''}"></div>
      `).join('');
    }

    function renderCategories() {
      const container = document.getElementById('category-scroll');
      container.innerHTML = categories.map(cat => `
        <div class="category-item flex flex-col items-center gap-2 cursor-pointer ${selectedCategory === cat.id ? 'active' : ''}" data-category="${cat.id}">
          <div class="category-img w-16 h-16 rounded-full bg-gradient-to-br from-pink-500/20 to-blue-500/20 border-2 border-white/10 flex items-center justify-center text-2xl">
            ${cat.emoji}
          </div>
          <span class="text-xs font-medium ${selectedCategory === cat.id ? 'gradient-text' : 'text-white/70'}">${cat.name}</span>
        </div>
      `).join('');
      
      container.querySelectorAll('.category-item').forEach(item => {
        item.addEventListener('click', () => {
          selectedCategory = item.dataset.category;
          renderCategories();
          renderMenu();
        });
      });
    }

    function getFilteredMenu() {
      return menuData.filter(item => {
        const matchesCategory = selectedCategory === 'all' || item.category === selectedCategory;
        const matchesVeg = !vegModeOn || item.veg;
        const matchesSearch = !searchQuery || 
          item.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
          item.desc.toLowerCase().includes(searchQuery.toLowerCase());
        return matchesCategory && matchesVeg && matchesSearch;
      });
    }

    function getCartQuantity(itemId) {
      const cartItem = cart.find(c => c.item_id === itemId);
      return cartItem ? cartItem.quantity : 0;
    }

    function renderMenu() {
      const filtered = getFilteredMenu();
      document.getElementById('item-count').textContent = `${filtered.length} items`;
      
      const container = document.getElementById('menu-grid');
      container.innerHTML = filtered.map(item => {
        const qty = getCartQuantity(item.id);
        return `
          <div class="menu-item-card glass-card p-4 transition-all duration-300" data-id="${item.id}">
            <div class="flex gap-4">
              <div class="flex-1">
                <div class="flex items-center gap-2 mb-1">
                  <div class="veg-indicator ${item.veg ? '' : 'non-veg-indicator'}"></div>
                  ${item.bestseller ? '<span class="bestseller-tag">★ Bestseller</span>' : ''}
                </div>
                <h3 class="font-semibold text-white mb-1">${item.name}</h3>
                <p class="text-xs text-white/50 mb-2 line-clamp-2">${item.desc}</p>
                <div class="flex items-center gap-2">
                  <span class="font-space font-bold text-lg gradient-text">₹${item.price}</span>
                  <span class="rating-badge flex items-center gap-1">★ ${item.rating}</span>
                </div>
              </div>
              <div class="relative">
                <div class="food-img-container w-28 h-28 bg-gradient-to-br from-pink-500/30 to-purple-600/30">
                  <img src="${item.image}" alt="${item.name}" loading="lazy" class="w-full h-full object-cover rounded-lg" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22112%22 height=%22112%22%3E%3Crect fill=%22%23ff006e%22 width=%22112%22 height=%22112%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-size=%2240%22%3E🍛%3C/text%3E%3C/svg%3E'">
                </div>
                <div class="absolute -bottom-2 left-1/2 -translate-x-1/2">
                  ${qty > 0 ? `
                    <div class="flex items-center gap-2 bg-[#1A0030] rounded-lg p-1 border border-pink-500/50">
                      <button class="quantity-btn minus-btn" data-id="${item.id}">−</button>
                      <span class="font-space font-bold text-sm w-5 text-center">${qty}</span>
                      <button class="quantity-btn plus-btn" data-id="${item.id}">+</button>
                    </div>
                  ` : `
                    <button class="add-btn px-6 py-2 rounded-lg font-semibold text-sm text-white add-to-cart-btn" data-id="${item.id}">
                      ADD
                    </button>
                  `}
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');
      
      // Add event listeners
      container.querySelectorAll('.add-to-cart-btn').forEach(btn => {
        btn.addEventListener('click', () => addToCart(btn.dataset.id));
      });
      container.querySelectorAll('.plus-btn').forEach(btn => {
        btn.addEventListener('click', () => updateQuantity(btn.dataset.id, 1));
      });
      container.querySelectorAll('.minus-btn').forEach(btn => {
        btn.addEventListener('click', () => updateQuantity(btn.dataset.id, -1));
      });
    }

    async function addToCart(itemId) {
      if (isLoading) return;
      if (cart.length >= 999) {
        showToast('Cart limit reached!');
        return;
      }
      
      const item = menuData.find(m => m.id === itemId);
      if (!item) return;
      
      isLoading = true;
      const btn = document.querySelector(`.add-to-cart-btn[data-id="${itemId}"]`);
      if (btn) btn.innerHTML = '<div class="loading-spinner mx-auto"></div>';
      
      const result = await window.dataSdk.create({
        item_id: itemId,
        item_name: item.name,
        quantity: 1,
        price: item.price,
        added_at: new Date().toISOString()
      });
      
      isLoading = false;
      
      if (result.isOk) {
        showToast('Added to cart!');
      } else {
        showToast('Failed to add item');
        renderMenu();
      }
    }

    async function updateQuantity(itemId, delta) {
      if (isLoading) return;
      
      const cartItem = cart.find(c => c.item_id === itemId);
      if (!cartItem) return;
      
      const newQty = cartItem.quantity + delta;
      isLoading = true;
      
      if (newQty <= 0) {
        const result = await window.dataSdk.delete(cartItem);
        if (!result.isOk) {
          showToast('Failed to remove item');
        }
      } else {
        const result = await window.dataSdk.update({
          ...cartItem,
          quantity: newQty
        });
        if (!result.isOk) {
          showToast('Failed to update quantity');
        }
      }
      
      isLoading = false;
    }

    function updateCartUI() {
      const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
      const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      
      document.getElementById('cart-count').textContent = totalItems;
      document.getElementById('cart-items-text').textContent = `${totalItems} item${totalItems !== 1 ? 's' : ''}`;
      document.getElementById('cart-total').textContent = totalPrice;
      document.getElementById('modal-cart-total').textContent = totalPrice;
      
      const cartPanel = document.getElementById('cart-panel');
      if (totalItems > 0) {
        cartPanel.classList.remove('hidden');
      } else {
        cartPanel.classList.add('hidden');
      }
      
      renderCartModal();
    }

    function renderCartModal() {
      const container = document.getElementById('cart-items-list');
      if (cart.length === 0) {
        container.innerHTML = '<p class="text-center text-white/50 py-8">Your cart is empty</p>';
        return;
      }
      
      const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      const taxes = Math.round(subtotal * 0.05); // 5% tax
      const total = subtotal + taxes;
      
      document.getElementById('modal-subtotal').textContent = subtotal;
      document.getElementById('modal-taxes').textContent = taxes;
      document.getElementById('modal-cart-total').textContent = total;
      
      container.innerHTML = cart.map(item => `
        <div class="flex items-center justify-between py-3 border-b border-white/10">
          <div class="flex items-center gap-3">
            <div class="veg-indicator ${item.menuItem?.veg ? '' : 'non-veg-indicator'}"></div>
            <div>
              <p class="font-medium text-sm">${item.item_name}</p>
              <p class="font-space text-white/60 text-sm">₹${item.price} x ${item.quantity}</p>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <button class="quantity-btn cart-minus" data-id="${item.item_id}">−</button>
            <span class="font-space font-bold w-5 text-center">${item.quantity}</span>
            <button class="quantity-btn cart-plus" data-id="${item.item_id}">+</button>
          </div>
        </div>
      `).join('');
      
      container.querySelectorAll('.cart-plus').forEach(btn => {
        btn.addEventListener('click', () => updateQuantity(btn.dataset.id, 1));
      });
      container.querySelectorAll('.cart-minus').forEach(btn => {
        btn.addEventListener('click', () => updateQuantity(btn.dataset.id, -1));
      });
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // Event listeners
    document.getElementById('search-input').addEventListener('input', (e) => {
      searchQuery = e.target.value;
      renderMenu();
    });

    document.getElementById('veg-toggle').addEventListener('click', function() {
      vegModeOn = !vegModeOn;
      this.classList.toggle('active', vegModeOn);
      renderMenu();
    });

    document.getElementById('view-cart-btn').addEventListener('click', () => {
      document.getElementById('cart-modal').classList.remove('hidden');
    });

    document.getElementById('close-cart-modal').addEventListener('click', () => {
      document.getElementById('cart-modal').classList.add('hidden');
    });

    document.getElementById('cart-modal-backdrop').addEventListener('click', () => {
      document.getElementById('cart-modal').classList.add('hidden');
    });

    document.getElementById('checkout-btn')?.addEventListener('click', () => {
      showToast('Order placed successfully! 🎉');
      document.getElementById('cart-modal').classList.add('hidden');
    });

    // Delivery mode toggle
    let deliveryMode = 'dine-in';
    
    document.getElementById('dine-in-btn').addEventListener('click', () => {
      deliveryMode = 'dine-in';
      document.getElementById('dine-in-section').classList.remove('hidden');
      document.getElementById('online-section').classList.add('hidden');
      document.getElementById('taxes-row').classList.remove('hidden');
      document.getElementById('delivery-row').classList.add('hidden');
      document.getElementById('dine-in-btn').classList.add('bg-gradient-to-r', 'from-pink-600', 'to-purple-600', 'border-pink-500', 'text-white');
      document.getElementById('dine-in-btn').classList.remove('bg-white/5', 'border-white/20');
      document.getElementById('online-btn').classList.remove('bg-gradient-to-r', 'from-pink-600', 'to-purple-600', 'border-pink-500', 'text-white');
      document.getElementById('online-btn').classList.add('bg-white/5', 'border-white/20');
      document.getElementById('whatsapp-order-btn').style.display = 'flex';
      renderCartModal();
    });
    
    document.getElementById('online-btn').addEventListener('click', () => {
      deliveryMode = 'online';
      document.getElementById('online-section').classList.remove('hidden');
      document.getElementById('dine-in-section').classList.add('hidden');
      document.getElementById('taxes-row').classList.add('hidden');
      document.getElementById('delivery-row').classList.remove('hidden');
      document.getElementById('online-btn').classList.add('bg-gradient-to-r', 'from-pink-600', 'to-purple-600', 'border-pink-500', 'text-white');
      document.getElementById('online-btn').classList.remove('bg-white/5', 'border-white/20');
      document.getElementById('dine-in-btn').classList.remove('bg-gradient-to-r', 'from-pink-600', 'to-purple-600', 'border-pink-500', 'text-white');
      document.getElementById('dine-in-btn').classList.add('bg-white/5', 'border-white/20');
      document.getElementById('whatsapp-order-btn').style.display = 'flex';
      renderCartModal();
    });

    document.getElementById('whatsapp-order-btn').addEventListener('click', () => {
      if (cart.length === 0) {
        showToast('Your cart is empty');
        return;
      }
      
      let orderDetails = '';
      
      if (deliveryMode === 'dine-in') {
        const selectedTable = document.getElementById('table-select').value;
        if (!selectedTable) {
          showToast('Please select a table number');
          return;
        }
        
        const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        const taxes = Math.round(subtotal * 0.05);
        const total = subtotal + taxes;
        
        // Build dine-in order message
        let message = `🍽️ *NEW DINE-IN ORDER - TABLE ${selectedTable}*\n\n`;
        message += `📋 *ORDER DETAILS:*\n`;
        message += `${'='.repeat(40)}\n\n`;
        
        cart.forEach((item, idx) => {
          const itemTotal = item.price * item.quantity;
          const vegIcon = item.menuItem?.veg ? '🥬' : '🍗';
          message += `${idx + 1}. ${vegIcon} ${item.item_name}\n`;
          message += `   ₹${item.price} × ${item.quantity} = ₹${itemTotal}\n\n`;
        });
        
        message += `${'='.repeat(40)}\n`;
        message += `💰 *BILL SUMMARY:*\n`;
        message += `Subtotal: ₹${subtotal}\n`;
        message += `Taxes & Charges (5%): ₹${taxes}\n`;
        message += `*TOTAL: ₹${total}*\n\n`;
        message += `📞 Table: ${selectedTable}\n`;
        message += `⏰ Time: ${new Date().toLocaleTimeString()}\n`;
        
        orderDetails = message;
      } else {
        const phone = document.getElementById('phone-input').value.trim();
        const address = document.getElementById('address-input').value.trim();
        
        if (!phone) {
          showToast('Please enter your phone number');
          return;
        }
        if (phone.length !== 10 || !/^\d{10}$/.test(phone)) {
          showToast('Please enter a valid 10-digit phone number');
          return;
        }
        if (!address) {
          showToast('Please enter your delivery address');
          return;
        }
        
        const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        const taxes = Math.round(subtotal * 0.05);
        const total = subtotal + taxes;
        const deliveryCharge = 50;
        const finalTotal = total + deliveryCharge;
        
        // Build online order message
        let message = `🚚 *NEW ONLINE ORDER*\n\n`;
        message += `👤 *CUSTOMER DETAILS:*\n`;
        message += `Phone: ${phone}\n`;
        message += `Address: ${address}\n\n`;
        message += `📋 *ORDER DETAILS:*\n`;
        message += `${'='.repeat(40)}\n\n`;
        
        cart.forEach((item, idx) => {
          const itemTotal = item.price * item.quantity;
          const vegIcon = item.menuItem?.veg ? '🥬' : '🍗';
          message += `${idx + 1}. ${vegIcon} ${item.item_name}\n`;
          message += `   ₹${item.price} × ${item.quantity} = ₹${itemTotal}\n\n`;
        });
        
        message += `${'='.repeat(40)}\n`;
        message += `💰 *BILL SUMMARY:*\n`;
        message += `Subtotal: ₹${subtotal}\n`;
        message += `Taxes & Charges (5%): ₹${taxes}\n`;
        message += `Delivery Charge: ₹${deliveryCharge}\n`;
        message += `*TOTAL: ₹${finalTotal}*\n\n`;
        message += `⏰ Time: ${new Date().toLocaleTimeString()}\n`;
        
        orderDetails = message;
      }
      
      // WhatsApp API
      const phoneNumber = '916386754482';
      const encodedMessage = encodeURIComponent(orderDetails);
      const whatsappUrl = `https://wa.me/${phoneNumber}?text=${encodedMessage}`;
      
      window.open(whatsappUrl, '_blank');
      showToast('Opening WhatsApp...');
      setTimeout(() => {
        document.getElementById('cart-modal').classList.add('hidden');
      }, 500);
    });

    // Banner auto-rotation
    setInterval(() => {
      currentBanner = (currentBanner + 1) % banners.length;
      renderBanners();
    }, 4000);

    // Initial render
    renderBanners();
    renderCategories();
    renderMenu();
  </script>
